<svg fill="none" viewBox="0 0 600 170" width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .ascii {
          font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
          font-size: 14px;
          line-height: 1.4;
          white-space: pre;
          color: #cba6f7; /* Mauve Catppuccin */
          margin: 0;
          padding: 15px 0;
        }
        .container {
          display: flex;
          justify-content: center;
          align-items: flex-start;
          height: 100%;
          width: 100%;
        }
        @media (prefers-color-scheme: light) {
          .ascii {
            color: #7287fd; /* Sapphire/Blue for Light Mode */
          }
        }
      </style>
      <div class="container">
        <pre class="ascii">
       .---.          OS: Technical University of Cluj-Napoca (UTCN)
      /     \         KERNEL: Computer Science (CS) Student
      |() ()|         SHELL: Zsh / PowerShell / Bash
      \  ^  /         FOCUS: Wireless Protocol Security
       |||||          STATUS: 🛡️ Hardening Physical Layers
       '---'          IDENTITY: Verified via GPG
        </pre>
      </div>
    </div>
  </foreignObject>
</svg>
